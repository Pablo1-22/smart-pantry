services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_pantry
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/smart_pantry
      JWT_SECRET_KEY: 86XmtomAX9S15Ax8obcHiZCwGIMGnsfnkNI6_1TtMH8
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/docs\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:5173 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
